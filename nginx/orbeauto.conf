server {
  listen 80;
  server_name auto.orbeone.com.br 98.80.120.69 _;

  client_max_body_size 25M;

  # landing: auto.orbeone.com.br/
  location = / {
    root /usr/share/nginx/html;
    try_files /index.html =404;
  }

  location /assets/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
  }

  # app: auto.orbeone.com.br/app
  location = /app {
    return 301 /app/;
  }

  location /app/ {
    proxy_pass http://orbeauto-web:5173;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # api: auto.orbeone.com.br/api
  location /api/ {
    proxy_pass http://orbeauto-api:8001/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # uploads: auto.orbeone.com.br/uploads
  location /uploads/ {
    proxy_pass http://orbeauto-api:8001/uploads/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # segurança básica
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
}
