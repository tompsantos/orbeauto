services:
  orbeauto-db:
    image: postgres:16-alpine
    container_name: orbeauto-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - orbeauto_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  orbeauto-api:
    build:
      context: ./backend
    container_name: orbeauto-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      UPLOAD_DIR: ${UPLOAD_DIR}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      GISS_A1_CERT_PATH: "/run/secrets/giss/prestador_a1.pfx"
      GISS_A1_CERT_PASSWORD_FILE: "/run/secrets/giss/a1_password.txt"
      GISS_ALLOW_REAL_SEND: "false"
      GISS_REAL_SEND_ORDER_ID: ""
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - /opt/orbeauto/secrets/giss:/run/secrets/giss:ro
    depends_on:
      - orbeauto-db
    restart: unless-stopped

  orbeauto-web:
    build: .
    container_name: orbeauto-web
    ports:
      - "127.0.0.1:5174:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - orbeauto-api
    restart: unless-stopped

  orbeauto-gateway:
    image: nginx:alpine
    container_name: orbeauto-gateway
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/orbeauto.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing:/usr/share/nginx/html:ro
    depends_on:
      - orbeauto-web
      - orbeauto-api
    restart: unless-stopped

  orbeauto-ssl:
    image: nginx:alpine
    container_name: orbeauto-ssl
    ports:
      - "443:443"
    volumes:
      - ./nginx/orbeauto-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - orbeauto-gateway
    networks:
      - default
    restart: unless-stopped

volumes:
  orbeauto_pgdata:
